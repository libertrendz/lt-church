name: Supabase Keep Alive

on:
  schedule:
    # Executa às 00:00 de cada 3 dias
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Permite que teste manualmente se desejar

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Database via Edge Function ou REST API
        run: |
          curl -X GET "https://dpsqiodxchdymxuhpbpx.supabase.co" \
          -H "apikey: ${{ sb_publishable_8wH7v9kWb7DFMgVuLX5GBg_S9brbAup }}" \
          -H "Authorization: Bearer ${{ sb_publishable_8wH7v9kWb7DFMgVuLX5GBg_S9brbAup }}"
